services:
    proconnect_laravel:
        build:
            context: .
            dockerfile: docker/php/Dockerfile.local-perf
        image: proconnect-laravel-local-perf:latest
        volumes:
            - "./.env:/var/www/html/.env:ro"
        env_file:
            - .env
        entrypoint:
            - php
            - artisan
            - serve
            - --host=0.0.0.0
            - --port=80
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
        environment:
            APP_ENV: '${APP_ENV:-local}'
            APP_DEBUG: '${APP_DEBUG:-false}'

            XDEBUG_MODE: 'off'
            SAIL_XDEBUG_MODE: 'off'
            XDEBUG_CONFIG: ''

            LOG_LEVEL: '${LOG_LEVEL:-warning}'

            DB_CONNECTION: '${DB_CONNECTION:-pgsql}'
            DB_HOST: proconnect_pgsql
            DB_PORT: 5432
            DB_DATABASE: '${DB_DATABASE}'
            DB_USERNAME: '${DB_USERNAME}'
            DB_PASSWORD: '${DB_PASSWORD:-secret}'

            CACHE_STORE: redis
            QUEUE_CONNECTION: redis
            SESSION_DRIVER: redis
            REDIS_HOST: proconnect_redis

            BROADCAST_CONNECTION: '${BROADCAST_CONNECTION:-reverb}'
            REVERB_APP_ID: '${REVERB_APP_ID:-local}'
            REVERB_APP_KEY: '${REVERB_APP_KEY:-proconnect-key}'
            REVERB_APP_SECRET: '${REVERB_APP_SECRET:-local}'
            REVERB_HOST: proconnect_reverb
            REVERB_PORT: 8080
            REVERB_SCHEME: http

            MAIL_MAILER: '${MAIL_MAILER:-log}'
            MAIL_HOST: proconnect_mailpit
            MAIL_PORT: 1025

            MONGODB_HOST: proconnect_mongodb
            MONGODB_PORT: 27017
            MONGODB_DATABASE: '${MONGODB_DATABASE:-proconnect_logs}'
            MONGODB_USERNAME: '${MONGODB_USERNAME:-proconnect}'
            MONGODB_PASSWORD: '${MONGODB_PASSWORD:-secret}'
        networks:
            - sail
        depends_on:
            proconnect_pgsql:
                condition: service_healthy
            proconnect_redis:
                condition: service_healthy
            proconnect_mailpit:
                condition: service_started
            proconnect_mongodb:
                condition: service_started
            proconnect_reverb:
                condition: service_started

    proconnect_horizon:
        build:
            context: .
            dockerfile: docker/php/Dockerfile.local-perf
        image: proconnect-laravel-local-perf:latest
        env_file:
            - .env
        volumes:
            - "./.env:/var/www/html/.env:ro"
        entrypoint:
            - php
            - artisan
            - horizon
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            APP_ENV: '${APP_ENV:-local}'
            APP_DEBUG: '${APP_DEBUG:-false}'

            XDEBUG_MODE: 'off'
            SAIL_XDEBUG_MODE: 'off'
            XDEBUG_CONFIG: ''

            LOG_LEVEL: '${LOG_LEVEL:-warning}'

            DB_CONNECTION: '${DB_CONNECTION:-pgsql}'
            DB_HOST: proconnect_pgsql
            DB_PORT: 5432
            DB_DATABASE: '${DB_DATABASE}'
            DB_USERNAME: '${DB_USERNAME}'
            DB_PASSWORD: '${DB_PASSWORD:-secret}'

            CACHE_STORE: redis
            QUEUE_CONNECTION: redis
            SESSION_DRIVER: redis
            REDIS_HOST: proconnect_redis

            BROADCAST_CONNECTION: '${BROADCAST_CONNECTION:-reverb}'
            REVERB_APP_ID: '${REVERB_APP_ID:-local}'
            REVERB_APP_KEY: '${REVERB_APP_KEY:-proconnect-key}'
            REVERB_APP_SECRET: '${REVERB_APP_SECRET:-local}'
            REVERB_HOST: proconnect_reverb
            REVERB_PORT: 8080
            REVERB_SCHEME: http

            MAIL_MAILER: '${MAIL_MAILER:-log}'
            MAIL_HOST: proconnect_mailpit
            MAIL_PORT: 1025

            MONGODB_HOST: proconnect_mongodb
            MONGODB_PORT: 27017
            MONGODB_DATABASE: '${MONGODB_DATABASE:-proconnect_logs}'
            MONGODB_USERNAME: '${MONGODB_USERNAME:-proconnect}'
            MONGODB_PASSWORD: '${MONGODB_PASSWORD:-secret}'
        networks:
            - sail
        depends_on:
            proconnect_redis:
                condition: service_healthy
            proconnect_pgsql:
                condition: service_healthy
            proconnect_mongodb:
                condition: service_started
            proconnect_reverb:
                condition: service_started
        restart: unless-stopped

    proconnect_reverb:
        build:
            context: .
            dockerfile: docker/php/Dockerfile.local-perf
        image: proconnect-laravel-local-perf:latest
        env_file:
            - .env
        entrypoint:
            - php
            - artisan
            - reverb:start
            - --host=0.0.0.0
            - --port=8080
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${FORWARD_REVERB_PORT:-8080}:8080'
        environment:
            APP_ENV: '${APP_ENV:-local}'
            APP_DEBUG: '${APP_DEBUG:-false}'

            XDEBUG_MODE: 'off'
            SAIL_XDEBUG_MODE: 'off'
            XDEBUG_CONFIG: ''

            LOG_LEVEL: '${LOG_LEVEL:-warning}'

            DB_CONNECTION: '${DB_CONNECTION:-pgsql}'
            DB_HOST: proconnect_pgsql
            DB_PORT: 5432
            DB_DATABASE: '${DB_DATABASE}'
            DB_USERNAME: '${DB_USERNAME}'
            DB_PASSWORD: '${DB_PASSWORD:-secret}'

            CACHE_STORE: redis
            QUEUE_CONNECTION: redis
            SESSION_DRIVER: redis
            REDIS_HOST: proconnect_redis

            BROADCAST_CONNECTION: '${BROADCAST_CONNECTION:-reverb}'
            REVERB_APP_ID: '${REVERB_APP_ID:-local}'
            REVERB_APP_KEY: '${REVERB_APP_KEY:-proconnect-key}'
            REVERB_APP_SECRET: '${REVERB_APP_SECRET:-local}'
            REVERB_HOST: proconnect_reverb
            REVERB_PORT: 8080
            REVERB_SCHEME: http
            REVERB_SERVER_HOST: 0.0.0.0
            REVERB_SERVER_PORT: 8080

            MONGODB_HOST: proconnect_mongodb
            MONGODB_PORT: 27017
            MONGODB_DATABASE: '${MONGODB_DATABASE:-proconnect_logs}'
            MONGODB_USERNAME: '${MONGODB_USERNAME:-proconnect}'
            MONGODB_PASSWORD: '${MONGODB_PASSWORD:-secret}'
        networks:
            - sail
        depends_on:
            proconnect_redis:
                condition: service_healthy
            proconnect_pgsql:
                condition: service_healthy
            proconnect_mongodb:
                condition: service_started
        restart: unless-stopped

    proconnect_pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './docker/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql:ro'
        networks:
            - sail
        healthcheck:
            test:
                - CMD-SHELL
                - 'pg_isready -q -d "$${POSTGRES_DB}" -U "$${POSTGRES_USER}"'
            interval: 5s
            timeout: 5s
            retries: 20

    proconnect_redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            interval: 5s
            timeout: 5s
            retries: 10

    proconnect_mongodb:
        image: 'mongo:7'
        restart: unless-stopped
        ports:
            - '${MONGODB_PORT:-27017}:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: '${MONGODB_USERNAME:-proconnect}'
            MONGO_INITDB_ROOT_PASSWORD: '${MONGODB_PASSWORD:-secret}'
            MONGO_INITDB_DATABASE: '${MONGODB_DATABASE:-proconnect_logs}'
        volumes:
            - 'proconnect-mongodb:/data/db'
        networks:
            - sail

    proconnect_mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail

    proconnect_livekit:
        image: livekit/livekit-server:latest
        container_name: proconnect_livekit
        command: --config /etc/livekit/livekit.yaml
        ports:
            - '7880:7880'
            - '7881:7881'
            - '60000-60100:60000-60100/udp'
        volumes:
            - './docker/livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro'
        networks:
            - sail

networks:
    sail:
        driver: bridge

volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    proconnect-mongodb:
        driver: local