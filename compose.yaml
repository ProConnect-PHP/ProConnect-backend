services:
    proconnect_laravel:
        build:
            context: ./vendor/laravel/sail/runtimes/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: sail-8.5/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
            - '${REVERB_PORT:-8080}:${REVERB_PORT:-8080}'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD:-.}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - proconnect_pgsql
            - proconnect_redis
            - proconnect_mailpit
            - proconnect_mongodb
        command: >
            sh -c "
            php artisan serve --host=0.0.0.0 --port=80 &
            php artisan reverb:start --host=0.0.0.0 --port=8080
            "
    proconnect_horizon:
        image: sail-8.5/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            QUEUE_CONNECTION: redis
            CACHE_STORE: redis
            REDIS_HOST: proconnect_redis
            APP_ENV: local          # Asegura que coincida con horizon.php
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            proconnect_redis:
                condition: service_healthy
            proconnect_mongodb:
                condition: service_started
            # proconnect_pgsql:   # opcional
        restart: unless-stopped
        command: php artisan horizon

    proconnect_pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD-SHELL
                - 'pg_isready -q -d "$${POSTGRES_DB}" -U "$${POSTGRES_USER}"'
            interval: 5s
            timeout: 5s
            retries: 20

    proconnect_redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    proconnect_mongodb:
        image: 'mongo:7'
        restart: unless-stopped
        ports:
            - '${MONGODB_PORT:-27017}:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: '${MONGODB_USERNAME:-proconnect}'
            MONGO_INITDB_ROOT_PASSWORD: '${MONGODB_PASSWORD:-secret}'
            MONGO_INITDB_DATABASE: '${MONGODB_DATABASE:-proconnect_logs}'
        volumes:
            - 'proconnect-mongodb:/data/db'
        networks:
            - sail

    proconnect_mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
    proconnect_livekit:
        image: livekit/livekit-server:latest
        container_name: proconnect_livekit
        command: --config /etc/livekit/livekit.yaml
        ports:
            - '7880:7880'
            - '7881:7881'
            - '60000-60100:60000-60100/udp'
        volumes:
            - './docker/livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro'
        networks:
            - sail

networks:
    sail:
        driver: bridge

volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    proconnect-mongodb:
        driver: local
